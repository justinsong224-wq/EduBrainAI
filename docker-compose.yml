version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: era-mysql
    environment:
      MYSQL_ROOT_PASSWORD: era_root_2024
      MYSQL_DATABASE: edu_rag
      MYSQL_USER: era_user
      MYSQL_PASSWORD: era_pass_2024
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: era-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass era_redis_2024
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: era-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: era_user
      RABBITMQ_DEFAULT_PASS: era_mq_2024
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  qdrant:
    image: qdrant/qdrant:latest
    container_name: era-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  qdrant_data: